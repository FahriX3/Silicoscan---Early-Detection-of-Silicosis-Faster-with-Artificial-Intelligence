# ================================================
# Silicoscan — Docker Compose
# ================================================
# 
# CPU Mode:
#   docker-compose up
#
# GPU Mode (uncomment deploy section below):
#   docker-compose up
# ================================================

services:
  silicoscan:
    build: .
    container_name: silicoscan
    ports:
      - "8000:8000"
    volumes:
      # Persist results
      - ./results:/app/results
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

    # ---- Uncomment untuk GPU support (NVIDIA) ----
