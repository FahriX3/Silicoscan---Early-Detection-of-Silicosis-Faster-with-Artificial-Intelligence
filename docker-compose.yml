# ================================================
# Silicoscan — Docker Compose
# ================================================
# 
# CPU Mode:
#   docker-compose up
#
# GPU Mode (uncomment deploy section below):
#   docker-compose up
# ================================================

services:
  silicoscan:
    build: .
    container_name: silicoscan
    ports:
      - "8000:8000"
    volumes:
      # Mount model weights dari parent directory
      - ../AI Masking/best_model.pth:/app/models/unet_masking.pth:ro
      - ../Model Klasifikasi/exp/best_swin_model.pth:/app/models/swin_classifier.pth:ro
      - ../Model Deteksi/train_run2_small_640/weights/best.pt:/app/models/yolo_detector.pt:ro
      # Persist results
      - ./results:/app/results
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

    # ---- Uncomment untuk GPU support (NVIDIA) ----
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
